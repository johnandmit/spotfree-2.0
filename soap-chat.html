<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luke's Cleaning — Chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --blue-deep: #1D4ED8;
      --blue-mid: #2563EB;
      --blue-light: #DBEAFE;
      --blue-pale: #EFF6FF;
      --grey-bg: #F1F5F9;
      --grey-light: #E2E8F0;
      --grey-mid: #94A3B8;
      --grey-text: #475569;
      --text-dark: #1E293B;
      --white: #FFFFFF;
      --success: #10B981;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(37, 99, 235, 0.10);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.07);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito Sans', sans-serif;
      margin: 0; padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0a0a0f;
    }

    /* ── SOAPY GLASS BACKGROUND ── */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0;
    }
    .bg-image {
      position: absolute; inset: 0;
      background: url('assets/auckland-sunset.jpg') no-repeat center center;
      background-size: cover;
    }
    #soap-canvas {
      position: absolute; inset: 0;
      z-index: 2;
      pointer-events: none; /* Let events pass through to chat, we listen on window */
    }

    /* ── CHAT SHELL (glassmorphism) ── */
    .chat-wrapper {
      position: relative; z-index: 10;
      padding: 16px;
    }

    /* ── CHAT SHELL ── */
    .chat-shell {
      width: 100%;
      max-width: 480px;
      height: 92vh;
      max-height: 780px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow:
        0 8px 48px rgba(0, 0, 0, 0.25),
        0 2px 12px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: rise .45s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── HEADER ── */
    .chat-header {
      background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 100%);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
    }

    .header-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--white);
      line-height: 1.2;
    }

    .header-status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4ADE80;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    /* ── MESSAGES AREA ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--grey-light);
      border-radius: 4px;
    }

    /* ── MESSAGE ROWS ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp .28s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      background: var(--blue-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--text-dark);
    }

    .msg-row.bot .bubble {
      background: var(--grey-bg);
      border-bottom-left-radius: 4px;
    }

    .msg-row.user .bubble {
      background: var(--blue-mid);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    /* system / action log rows */
    .msg-row.system {
      justify-content: center;
      margin: 4px 0;
    }

    .system-pill {
      background: var(--blue-pale);
      border: 1px solid var(--blue-light);
      color: var(--blue-deep);
      font-size: 11.5px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── TYPING INDICATOR ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--grey-mid);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: .18s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: .36s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-6px);
      }
    }

    /* ── QUICK REPLIES ── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0 10px 36px;
      animation: fadeUp .3s ease both;
    }

    .qr-btn {
      background: var(--white);
      border: 1.5px solid var(--blue-mid);
      color: var(--blue-mid);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      padding: 7px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .18s ease;
      white-space: nowrap;
    }

    .qr-btn:hover {
      background: var(--blue-mid);
      color: var(--white);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }

    .qr-btn.primary {
      background: var(--blue-mid);
      color: var(--white);
    }

    .qr-btn.primary:hover {
      background: var(--blue-deep);
    }

    /* ── QUOTE FORM CARD ── */
    .form-card {
      background: var(--white);
      border: 1.5px solid var(--blue-light);
      border-radius: var(--radius-lg);
      padding: 18px;
      margin: 4px 0 4px 36px;
      box-shadow: var(--shadow-sm);
      animation: fadeUp .3s ease both;
    }

    .form-card-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--blue-deep);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--grey-text);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .form-select,
    .form-input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--grey-light);
      border-radius: var(--radius-sm);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      background: var(--grey-bg);
      outline: none;
      transition: border-color .15s;
      appearance: none;
    }

    .form-select:focus,
    .form-input:focus {
      border-color: var(--blue-mid);
      background: var(--white);
    }

    .form-select.error,
    .form-input.error {
      border-color: #EF4444;
      background: #FEF2F2;
    }

    .form-row {
      display: flex;
      gap: 10px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--grey-bg);
      border: 1.5px solid var(--grey-light);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--grey-text);
      transition: all .15s;
      user-select: none;
    }

    .checkbox-item input {
      display: none;
    }

    .checkbox-item.checked {
      background: var(--blue-pale);
      border-color: var(--blue-mid);
      color: var(--blue-deep);
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-deep));
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: all .18s ease;
      margin-top: 4px;
      letter-spacing: .02em;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── SUBURB AUTOCOMPLETE ── */
    .suburb-wrapper { position: relative; }
    .suburb-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
      background: var(--white); border: 1.5px solid var(--blue-light);
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      max-height: 160px; overflow-y: auto;
      box-shadow: var(--shadow-sm); display: none;
    }
    .suburb-dropdown.open { display: block; }
    .suburb-option {
      padding: 8px 12px; font-size: 13px; cursor: pointer;
      color: var(--text-dark); transition: background .1s;
    }
    .suburb-option:hover, .suburb-option.active {
      background: var(--blue-pale); color: var(--blue-deep);
    }

    /* ── ESTIMATE CARD ── */
    .estimate-card {
      background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
      border: 1.5px solid var(--blue-light);
      border-radius: var(--radius-lg);
      padding: 16px 18px; margin: 6px 0 6px 36px;
      animation: fadeUp .3s ease both;
    }
    .estimate-title {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 14px; color: var(--blue-deep); margin-bottom: 10px;
    }
    .estimate-line {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 3px 0; color: var(--grey-text);
    }
    .estimate-line .label { font-weight: 600; }
    .estimate-line .price { font-weight: 700; color: var(--text-dark); }
    .estimate-total {
      display: flex; justify-content: space-between;
      font-size: 15px; padding: 8px 0 0; margin-top: 8px;
      border-top: 1.5px solid var(--blue-light);
      font-family: 'Nunito', sans-serif; font-weight: 800;
      color: var(--blue-deep);
    }
    .estimate-note {
      font-size: 11px; color: var(--grey-mid); margin-top: 8px;
      line-height: 1.4;
    }

    /* ── DIVIDER ── */
    .chat-divider {
      height: 1px;
      background: var(--grey-light);
      margin: 0 16px;
      flex-shrink: 0;
    }

    /* ── INPUT BAR ── */
    .chat-input-bar {
      padding: 12px 14px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      padding: 11px 16px;
      background: var(--grey-bg);
      border: 1.5px solid transparent;
      border-radius: 24px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text-dark);
      outline: none;
      transition: border-color .15s, background .15s;
      resize: none;
      height: 44px;
      line-height: 1.4;
    }

    .chat-input:focus {
      border-color: var(--blue-mid);
      background: var(--white);
    }

    .chat-input::placeholder {
      color: var(--grey-mid);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--blue-mid);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .18s ease;
      box-shadow: 0 3px 10px rgba(37, 99, 235, 0.3);
    }

    .send-btn:hover {
      background: var(--blue-deep);
      transform: scale(1.05);
    }

    .send-btn:active {
      transform: scale(.96);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* ── TIMESTAMP ── */
    .msg-time {
      font-size: 10.5px;
      color: var(--grey-mid);
      text-align: center;
      margin: 8px 0 4px;
    }

    /* ── LOCKED INPUT ── */
    .chat-input-bar.locked .chat-input {
      pointer-events: none; opacity: 0.5;
    }
    .chat-input-bar.locked .send-btn {
      pointer-events: none; opacity: 0.4;
    }

    /* ── CONFIRMATION CARD ── */
    .confirm-card {
      background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
      border: 1.5px solid #6EE7B7;
      border-radius: var(--radius-lg);
      padding: 16px 18px; margin: 6px 0 6px 36px;
      animation: fadeUp .3s ease both;
      text-align: center;
    }
    .confirm-card .confirm-icon { font-size: 28px; margin-bottom: 6px; }
    .confirm-card .confirm-title {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 14px; color: #065F46; margin-bottom: 4px;
    }
    .confirm-card .confirm-text {
      font-size: 12.5px; color: #047857; line-height: 1.5;
    }
  </style>
</head>

        onkeydown="handleKey(event)" />

  <script>
    // ── SOAP SUDS PARTICLE ENGINE ──
    (function() {
      const canvas = document.getElementById('soap-canvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      let particles = [];
      let lastX = null, lastY = null;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class SoapBubble {
        constructor(x, y, dx, dy) {
          this.x = x + (Math.random() - 0.5) * 25;
          this.y = y + (Math.random() - 0.5) * 25;
          // Initial velocity based on mouse flick + random spread
          this.vx = dx * 0.15 + (Math.random() - 0.5) * 4;
          this.vy = dy * 0.15 + (Math.random() - 0.5) * 4;
          this.radius = Math.random() * 12 + 4;
          this.life = 1.0;
          this.decay = Math.random() * 0.015 + 0.005; // Lasts ~1-3 seconds
        }

        update() {
          // Glass friction
          this.vx *= 0.90;
          this.vy *= 0.90;
          // Gravity pull down the window
          this.vy += 0.12;
          
          this.x += this.vx;
          this.y += this.vy;
          this.life -= this.decay;
        }

        draw(ctx) {
          if (this.life <= 0) return;
          const r = Math.max(0.1, this.radius * Math.sqrt(this.life));
          
          ctx.beginPath();
          ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(240, 248, 255, ${0.4 * this.life})`; 
          ctx.fill();
          
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.7 * this.life})`;
          ctx.stroke();

          // Specular highlight bubble reflection
          ctx.beginPath();
          ctx.arc(this.x - r*0.3, this.y - r*0.3, r*0.25, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${0.9 * this.life})`;
          ctx.fill();
        }
      }

      window.addEventListener('mousemove', (e) => {
        const currentX = e.clientX;
        const currentY = e.clientY;
        
        if (lastX !== null && lastY !== null) {
          const dx = currentX - lastX;
          const dy = currentY - lastY;
          // Emit a burst of soap bubbles based on distance moved
          const dist = Math.sqrt(dx*dx + dy*dy);
          const numParticles = Math.min(10, Math.floor(dist / 5) + 2);
          
          for (let i = 0; i < numParticles; i++) {
            particles.push(new SoapBubble(currentX, currentY, dx, dy));
          }
        }
        
        lastX = currentX;
        lastY = currentY;
      });

      // Reset mouse tracking when leaving
      window.addEventListener('mouseleave', () => {
        lastX = null;
        lastY = null;
      });

      function animate() {
        ctx.clearRect(0, 0, W, H);
        
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.update();
          p.draw(ctx);
          if (p.life <= 0) {
            particles.splice(i, 1);
          }
        }
        
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>

  <script>
    // ── CONFIG ──────────────────────────────────────────────
    const N8N_WEBHOOK = "https://n8n.arfquant.com/webhook/f023815a-3b3a-42e2-97d9-4e1a9ebb3f3b";
    const BOT_NAME = "Luke's Assistant";
    const TYPING_MS = 18; // ms per character for typing animation

    // ── STATE ───────────────────────────────────────────────
    let chatHistory = []; // full history sent to n8n each time
    let quickRepliesShown = false;
    let formShown = false;
    let isProcessing = false;
    let lastMessageTime = 0;

    function lockInput() {
      isProcessing = true;
      const bar = document.querySelector('.chat-input-bar');
      if (bar) bar.classList.add('locked');
    }
    function unlockInput() {
      isProcessing = false;
      const bar = document.querySelector('.chat-input-bar');
      if (bar) bar.classList.remove('locked');
    }

    // ── INIT ─────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("time-label").textContent = formatTime(new Date());
      setTimeout(() => {
        showTyping(800).then(() => {
          const greeting = "Hi there! 👋 Welcome to Spotfree. How can I help you today?";
          addBotMessage(greeting, true).then(() => {
            if (!quickRepliesShown) showQuickReplies();
            // Auto-open quote form if triggered via URL hash
            if (window.location.hash === '#auto_quote') {
              setTimeout(() => handleQuickReply('get_quote'), 400);
              history.replaceState(null, '', window.location.pathname);
            }
          });
        });
      }, 600);
    });

    // ── QUICK REPLIES ────────────────────────────────────────
    function showQuickReplies() {
      quickRepliesShown = true;
      const container = document.getElementById("messages");

      const qr = document.createElement("div");
      qr.className = "quick-replies";
      qr.id = "quick-replies";
      qr.innerHTML = `
    <button class="qr-btn primary" onclick="handleQuickReply('get_quote')">💰 Get a Quote</button>
    <button class="qr-btn primary" onclick="handleQuickReply('book')">📅 Book a Visit</button>
    <button class="qr-btn primary" onclick="handleQuickReply('callback')">📞 Talk to Luke</button>
    <button class="qr-btn" onclick="handleQuickReply('what_services')">🧹 What services?</button>
    <button class="qr-btn" onclick="handleQuickReply('how_long')">⏱ How long?</button>
    <button class="qr-btn" onclick="handleQuickReply('areas')">📍 What areas?</button>
  `;
      container.appendChild(qr);
      scrollToBottom();
    }

    function removeQuickReplies() {

    // Frequency discounts
    const FREQ_DISCOUNT = { one_off: 0, '6_months': 0.10, annual: 0.05 };

    function calculateEstimate(propertyType, homeSize, services, frequency) {
      const lineItems = [];
      let subtotal = 0;
      services.forEach(svc => {
        const base = PRICING[svc]?.[propertyType]?.[homeSize] || 0;
        lineItems.push({ service: svc, price: base });
        subtotal += base;
      });
      const discount = FREQ_DISCOUNT[frequency] || 0;
      const discountAmt = Math.round(subtotal * discount);
      const total = subtotal - discountAmt;
      return { lineItems, subtotal, discount, discountAmt, total };
    }

        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestType: 'Book a Visit', business: 'Spotfree', ...formData })
      }).catch(() => {});

      // Confirmation card
      const container = document.getElementById("messages");
      const confirm = document.createElement("div");
      confirm.className = "confirm-card";
      confirm.innerHTML = `
        <div class="confirm-icon">\u2705</div>
        <div class="confirm-title">Booking Request Sent!</div>
        <div class="confirm-text">Luke will be in touch within 24 hours to confirm your appointment.</div>
      `;
      container.appendChild(confirm);
      scrollToBottom();
      sendToN8N(summary);
    }

    // ── GENERIC CONTACT FORM BUILDER ──────────────────
    function injectContactForm(type, title, extraLabel, extraPlaceholder, eventName) {
      const container = document.getElementById("messages");
      const card = document.createElement("div");
      card.className = "form-card";
      card.id = `${type}-form-card`;
      card.innerHTML = `
        <div class="form-card-title">${title}</div>

        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input class="form-input" id="cf-name" type="text" placeholder="First name is fine" oninput="this.classList.remove('error')" />
        </div>

        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input class="form-input" id="cf-phone" type="tel" placeholder="e.g. 021 123 4567" oninput="this.classList.remove('error')" />
        </div>

        <div class="form-group">
          <label class="form-label">Email (optional)</label>
          <input class="form-input" id="cf-email" type="email" placeholder="your@email.co.nz" />
        </div>

        <div class="form-group">
          <label class="form-label">${extraLabel}</label>
          <input class="form-input" id="cf-extra" type="text" placeholder="${extraPlaceholder}" />
        </div>

        <button class="submit-btn" id="cf-submit-btn" onclick="submitContactForm('${type}', '${eventName}')">Submit \u2192</button>
      `;
      container.appendChild(card);
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'end' }), 50);
    }

    function submitContactForm(type, eventName) {
      const btn = document.getElementById("cf-submit-btn");
      if (btn) { btn.disabled = true; btn.textContent = "Sending..."; }

      const name  = document.getElementById("cf-name").value.trim();
      const phone = document.getElementById("cf-phone").value.trim();
      const email = document.getElementById("cf-email").value.trim();
      const extra = document.getElementById("cf-extra").value.trim();

      // Validate required fields
      let hasError = false;
      if (!name) { document.getElementById("cf-name").classList.add("error"); hasError = true; }
      if (!phone) { document.getElementById("cf-phone").classList.add("error"); hasError = true; }

      if (hasError) {
        if (btn) { btn.disabled = false; btn.textContent = "Submit \u2192"; }
        return;
      }

      // Remove form
      const formCard = document.getElementById(`${type}-form-card`);
      if (formCard) formCard.remove();

      // User message summary
      const summary = `\ud83d\udcdd Contact details:\n\u2022 Name: ${name}\n\u2022 Phone: ${phone}${email ? '\n\u2022 Email: ' + email : ''}${extra ? '\n\u2022 ' + extra : ''}`;
      addUserMessage(summary, false);

      // Log the event
      const formData = { name, phone, email, extra, type };
      logSystemEvent(eventName, formData);

      // POST to chatbot log webhook
      const requestType = type === 'callback' ? 'Talk to Luke' : type === 'booking' ? 'Book a Visit' : 'Waitlist';
      fetch('https://n8n.arfquant.com/webhook/chatbotlog', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestType, business: 'Spotfree', ...formData })
      }).catch(() => {});

      // Show confirmation card
      const container = document.getElementById("messages");
      const confirm = document.createElement("div");
      confirm.className = "confirm-card";
      const confirmMessages = {
        booking: { icon: '\u2705', title: 'Booking Request Sent!', text: 'Luke will be in touch within 24 hours to confirm your appointment.' },
        waitlist: { icon: '\ud83d\udccb', title: 'Added to Waitlist!', text: "You're on the list! Luke will reach out as soon as a slot opens up." },
        callback: { icon: '\ud83d\udcde', title: 'Callback Requested!', text: 'Luke will give you a ring when he\'s free \u2014 usually within a few hours.' }
      };
      const cm = confirmMessages[type];
      confirm.innerHTML = `
        <div class="confirm-icon">${cm.icon}</div>
        <div class="confirm-title">${cm.title}</div>
        <div class="confirm-text">${cm.text}</div>
      `;
      container.appendChild(confirm);
      scrollToBottom();

      // Send to n8n so Luke gets notified
      sendToN8N(summary);
    }

    // ── DEMO REPLIES (when n8n isn't connected) ───────────────
    function getDemoReply(text) {
      const t = text.toLowerCase();
      if (t.includes("service")) return "Luke offers standard cleans, deep cleans, and move in/out cleans. He brings all his own supplies and equipment — no need to worry about a thing! 🧹";
      if (t.includes("long") || t.includes("time")) return "For a standard 3-bedroom home, a clean typically takes 2.5–3.5 hours. A deep clean can take 4–6 hours depending on the condition. Luke will give you a more accurate time after your quote! ⏱";
      if (t.includes("area") || t.includes("suburb") || t.includes("service")) return "Luke services most of the Auckland region. Drop your suburb and I can confirm whether he covers your area! 📍";
      if (t.includes("price") || t.includes("cost") || t.includes("charge") || t.includes("quote")) return "Happy to help with that! Hit the 'Get a Quote' button and fill in a few quick details — I'll give you an estimate straight away. 💰";
      if (t.includes("book") || t.includes("available")) return "Luke is currently fully booked, but you can join his waitlist and we'll reach out as soon as a slot opens up. Would you like me to add you? 📋";
      return "Thanks for your message! To make sure Luke gets all the right details, would you like to get a quote or is there something specific I can help with? 😊";
    }

    function extractCode(text) {
      const match = text.match(/\[([A-Z_]+)\]/);
      return match ? match[1] : null;
    }

    // ── CHAT HISTORY HELPERS ──────────────────────────────────
    function addUserMessage(text, skipHistory) {
      if (!skipHistory) {
        chatHistory.push({ role: "user", content: text, timestamp: isoNow() });
      }
      const container = document.getElementById("messages");
      const row = document.createElement("div");
      row.className = "msg-row user";
      row.innerHTML = `<div class="bubble">${escHtml(text).replace(/\n/g, "<br>")}</div>`;
      container.appendChild(row);
      scrollToBottom();
    }

    function addBotMessage(text, animate) {
      return new Promise(resolve => {
        chatHistory.push({ role: "assistant", content: text, timestamp: isoNow() });
        const container = document.getElementById("messages");
        const row = document.createElement("div");
        row.className = "msg-row bot";

        const avatar = document.createElement("div");
        avatar.className = "msg-avatar";
        avatar.textContent = "🧹";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        row.appendChild(avatar);
        row.appendChild(bubble);
        container.appendChild(row);
        scrollToBottom();

        if (animate) {
          let i = 0;
          const chars = text.split("");
          const interval = setInterval(() => {
            bubble.innerHTML = escHtml(chars.slice(0, ++i).join("")).replace(/\n/g, "<br>");
            scrollToBottom();
            if (i >= chars.length) {
              clearInterval(interval);
              resolve();
            }
          }, TYPING_MS);
        } else {
          bubble.innerHTML = escHtml(text).replace(/\n/g, "<br>");
          resolve();
        }
      });
    }

    function logSystemEvent(event, data) {
      chatHistory.push({
        role: "system",
        event,
        data,
        timestamp: isoNow()
      });
      // Events are logged to chatHistory for n8n but not shown in UI
    }

    // ── TYPING INDICATOR ──────────────────────────────────────
    function showTyping(ms) {
      return new Promise(resolve => {
        // Remove any existing typing indicator first
        removeTypingIndicator();

        const container = document.getElementById("messages");
        const row = document.createElement("div");
        row.className = "msg-row bot";
        row.id = "typing-row";

        const avatar = document.createElement("div");
        avatar.className = "msg-avatar";
        avatar.textContent = "\ud83e\uddf9";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

        row.appendChild(avatar);
        row.appendChild(bubble);
        container.appendChild(row);
        scrollToBottom();

        if (ms) {
          // Timed mode: auto-remove after delay
          setTimeout(() => {
            removeTypingIndicator();
            resolve();
          }, ms);
        } else {
          // Persistent mode: dots stay until manually removed
          resolve();
        }
      });
    }

    function removeTypingIndicator() {
      const el = document.getElementById("typing-row");
      if (el) el.remove();
    }

    // ── UTILS ─────────────────────────────────────────────────
    function scrollToBottom() {
      const el = document.getElementById("messages");
      el.scrollTop = el.scrollHeight;
    }

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function isoNow() { return new Date().toISOString(); }

    function formatTime(d) {
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }
  </script>
</body>

</html>
